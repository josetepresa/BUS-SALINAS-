<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Salinas · Check-in</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }

  .header { background: white; border-bottom: 1px solid #e5e5e0; padding: 16px 20px; text-align: center; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .header p { font-size: 13px; color: #888; margin-top: 2px; }

  .section-label { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 16px; margin: 16px 0 8px; }

  .names-list { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 8px; }

  .name-btn {
    width: 100%; padding: 15px 16px;
    background: white; border: 1px solid #e5e5e0;
    border-radius: 12px; font-size: 16px; color: #1a1a1a;
    text-align: left; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .name-btn:active { transform: scale(0.98); }
  .name-btn.checked { background: #E1F5EE; border-color: #1D9E75; color: #085041; pointer-events: none; }
  .name-btn .check-icon { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .name-btn.checked .check-icon { background: #1D9E75; border-color: #1D9E75; }
  .name-btn.checked .check-icon svg { display: block; }
  .name-btn .check-icon svg { display: none; }

  .confirmed-screen {
    display: none; position: fixed; inset: 0;
    background: #E1F5EE; flex-direction: column;
    align-items: center; justify-content: center; z-index: 200; text-align: center; padding: 32px;
  }
  .confirmed-screen.show { display: flex; }
  .confirmed-screen .big-check { width: 80px; height: 80px; background: #1D9E75; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .confirmed-screen h2 { font-size: 26px; font-weight: 700; color: #085041; margin-bottom: 8px; }
  .confirmed-screen p { font-size: 16px; color: #0F6E56; }
</style>
</head>
<body>

<div class="header">
  <h1>🚌 Bus Salinas · Boda</h1>
  <p>Piñole · 11:30h — Toca tu nombre</p>
</div>

<div class="section-label">¿Quién eres?</div>
<div class="names-list" id="names-list"></div>

<div class="confirmed-screen" id="confirmed-screen">
  <div class="big-check">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h2 id="confirmed-name">¡Listo!</h2>
  <p>Ya estás registrado en el bus 🎉</p>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/a/macros/joseylasmates.com/s/AKfycbwJpxiRzYdzNTjDSTSeDgZYud9wHJeb19v_dSdRbXqEN24u3DGtOm98dYehEmbvqGXD/exec';

const names = [
  "María Erasmus","Nacho","Alba baby","Jaime Negro","Ade","Moro","Clara","Guille",
  "Ce","Sonso","Adri","Carmen","Blas","Clau","Gloria","Diego","Leti","Julio / Jaguar",
  "Adela","Elvira (madre Gloria)","Manolo (padre Gloria)","Fran","Isidro","Yolanda",
  "José","Andrea","Mayte","Carlota","Alex","Candela","Javi","Marta","Rober",
  "Natalia","Teresa","Paula"
];

const alreadyChecked = localStorage.getItem('bus_salinas_yo');

if (alreadyChecked) {
  document.getElementById('confirmed-name').textContent = '¡Hola, ' + alreadyChecked + '!';
  document.getElementById('confirmed-screen').classList.add('show');
}

const list = document.getElementById('names-list');
names.forEach((name) => {
  const btn = document.createElement('button');
  btn.className = 'name-btn';
  btn.innerHTML = '<span>' + name + '</span><span class="check-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>';
  btn.onclick = () => {
    btn.classList.add('checked');
    localStorage.setItem('bus_salinas_yo', name);
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre: name })
    });
    document.getElementById('confirmed-name').textContent = '¡Hola, ' + name.split(' ')[0] + '!';
    document.getElementById('confirmed-screen').classList.add('show');
  };
  list.appendChild(btn);
});
</script>
</body>
</html>
