<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Salinas · Check-in</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }

  .header { background: white; border-bottom: 1px solid #e5e5e0; padding: 16px 20px; text-align: center; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .header p { font-size: 13px; color: #888; margin-top: 2px; }

  .counter { text-align: center; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #1a1a1a; }
  .counter span { color: #1D9E75; font-weight: 700; }

  .names-list { padding: 0 16px 60px; display: flex; flex-direction: column; gap: 8px; }

  .name-btn {
    width: 100%; padding: 15px 16px;
    background: white; border: 1px solid #e5e5e0;
    border-radius: 12px; font-size: 17px; color: #1a1a1a;
    text-align: left; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .name-btn.checked { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
  .name-btn.checked::after { content: '✓'; font-size: 18px; color: #1D9E75; font-weight: 700; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1a1a; color: white; padding: 12px 22px;
    border-radius: 999px; font-size: 14px; font-weight: 500;
    white-space: nowrap; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🚌 Bus Salinas · Boda</h1>
  <p>Piñole · 11:30h</p>
</div>

<div class="counter" id="counter">En el bus: <span id="count">0</span> / 36</div>

<div class="names-list" id="names-list"></div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKbAJ_1yTR8jETo-Pd4gFVfo8hVCXFfJSQSWyogI93A5Mc1ZSmiJxqaifWhCNUamA/exec';

const names = [
  "María Erasmus","Nacho","Alba baby","Jaime Negro","Ade","Moro","Clara","Guille",
  "Ce","Sonso","Adri","Carmen","Blas","Clau","Gloria","Diego","Leti","Julio / Jaguar",
  "Adela","Elvira (madre Gloria)","Manolo (padre Gloria)","Fran","Isidro","Yolanda",
  "José","Andrea","Mayte","Carlota","Alex","Candela","Javi","Marta","Rober",
  "Natalia","Teresa","Paula"
];

const checked = new Set();
const list = document.getElementById('names-list');

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function updateCounter() {
  document.getElementById('count').textContent = checked.size;
}

names.forEach((name) => {
  const btn = document.createElement('button');
  btn.className = 'name-btn';
  btn.textContent = name;
  btn.onclick = () => {
    if (checked.has(name)) return;
    checked.add(name);
    btn.classList.add('checked');
    updateCounter();
    showToast('✓ ' + name + ' — registrado');
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre: name })
    });
  };
  list.appendChild(btn);
});
</script>
</body>
</html>
